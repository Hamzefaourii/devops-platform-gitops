apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-prereqs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Hamzefaourii/devops-platform-gitops.git
    targetRevision: main
    path: platform/gitlab
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
