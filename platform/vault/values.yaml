global:
  enabled: true

server:
  enabled: true

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: hcloud-volumes
    accessMode: ReadWriteOnce

  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: Prefix
    activeService: true
    hosts:
      - host: vault.local
        paths:
          - /

  ha:
    enabled: true
    replicas: 3
    raft:
      enabled: true
      setNodeId: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
        }

        storage "raft" {
          path = "/vault/data"
        }

        service_registration "kubernetes" {}

ui:
  enabled: true
